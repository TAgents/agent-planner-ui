      "@context": "https://schema.org",

      "name": "AgentPlanner",
      "url": "https://agentplanner.io",

      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },

        "@type": "Organization",
        "name": "Talking Agents",
        "url": "https://www.talkingagents.com"
      }
    }

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <script>
      // Apply dark mode before paint to prevent flash
      try {
        if (localStorage.getItem('darkMode') === 'true') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#0e0c0a';
