<!DOCTYPE html>

    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon.png" />

    />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AgentPlanner",
      "url": "https://agentplanner.io",
      "description": "Structured planning backend for AI agents. Hierarchical plans, dependency tracking, knowledge graph, and real-time sync.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Talking Agents",
        "url": "https://www.talkingagents.com"
      }
    }
    </script>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Agent Planner - AI-Powered Planning for Your Ideas</title>
    <script>
      // Apply dark mode before paint to prevent flash of white
      try {
        if (localStorage.getItem('darkMode') === 'true') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#030712';
        }
      } catch (e) {}
    </script>
